<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Competency Framework</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');

:root{
  --ink:#161C2E;
  --ink-soft:#2A3350;
  --paper:#F5F3EE;
  --card:#FFFFFF;
  --line:#E4E0D6;
  --brass:#AD8A3D;
  --brass-soft:#E7D9B8;
  --teal:#3E6259;
  --text:#2B2E36;
  --text-mute:#6B7280;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--text);
  font-family:'Inter',sans-serif;
  display:flex;
  min-height:100vh;
}

/* ---------- LEFT LADDER RAIL ---------- */
.rail{
  width:290px;
  min-width:290px;
  background:var(--ink);
  color:#EDEBE4;
  padding:36px 24px;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
}
.rail-eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--brass-soft);
  margin-bottom:6px;
}
.rail-title{
  font-family:'Newsreader',serif;
  font-size:24px;
  line-height:1.2;
  margin:0 0 6px 0;
  font-weight:500;
}
.rail-sub{
  font-size:12.5px;
  color:#A9AEC2;
  margin-bottom:28px;
  line-height:1.5;
}

.ladder{
  position:relative;
  padding-left:4px;
}
.ladder::before{
  content:'';
  position:absolute;
  left:17px;
  top:12px;
  bottom:12px;
  width:2px;
  background:linear-gradient(180deg, var(--brass) 0%, rgba(173,138,61,.15) 100%);
}
.rung{
  position:relative;
  display:flex;
  align-items:flex-start;
  gap:14px;
  padding:10px 8px 10px 0;
  cursor:pointer;
  border-radius:8px;
  transition:background .15s ease;
}
.rung:hover{ background:rgba(255,255,255,.04); }
.rung-node{
  flex:0 0 auto;
  width:36px;
  height:36px;
  border-radius:50%;
  background:var(--ink-soft);
  border:2px solid rgba(173,138,61,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:#C8CCDB;
  position:relative;
  z-index:1;
  transition:all .2s ease;
}
.rung.active .rung-node{
  background:var(--brass);
  border-color:var(--brass);
  color:var(--ink);
  font-weight:700;
  box-shadow:0 0 0 4px rgba(173,138,61,.18);
}
.rung-copy{ padding-top:2px; }
.rung-name{
  font-size:13.5px;
  font-weight:600;
  color:#EDEBE4;
  line-height:1.35;
  transition:color .2s ease;
}
.rung.active .rung-name{ color:var(--brass-soft); }

/* ---------- MAIN CONTENT ---------- */
.main{
  flex:1;
  padding:48px 56px 80px;
  max-width:1000px;
}
.level-header{
  border-bottom:1px solid var(--line);
  padding-bottom:24px;
  margin-bottom:36px;
}
.level-kicker{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--brass);
  margin-bottom:10px;
}
.level-name{
  font-family:'Newsreader',serif;
  font-size:36px;
  font-weight:500;
  margin:0 0 10px 0;
  color:var(--ink);
}
.level-tagline{
  font-size:16px;
  color:var(--text-mute);
  max-width:660px;
  line-height:1.5;
}

.category{ margin-bottom:44px; }
.category-head{
  display:flex;
  align-items:baseline;
  gap:10px;
  margin-bottom:18px;
}
.category-title{
  font-family:'Newsreader',serif;
  font-size:22px;
  font-weight:600;
  color:var(--ink);
}
.category-count{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  color:var(--text-mute);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;
  align-items:start;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:10px;
  padding:20px;
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  animation:rise .35s ease both;
}
.card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(22,28,46,.06);
}
.card.expanded{
  border-color:var(--brass);
  box-shadow:0 10px 24px rgba(22,28,46,.08);
}
@keyframes rise{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  margin-bottom:8px;
}
.card-name{
  font-weight:700;
  font-size:15px;
  color:var(--ink);
}
.chevron{
  flex:0 0 auto;
  width:20px;
  height:20px;
  border-radius:50%;
  background:var(--paper);
  color:var(--brass);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  transition:transform .2s ease;
  margin-top:1px;
}
.card.expanded .chevron{ transform:rotate(180deg); }

.card-statement{
  font-size:13.5px;
  color:var(--text);
  line-height:1.5;
  margin-bottom:14px;
}

.progress-track{
  display:flex;
  gap:3px;
  margin-bottom:14px;
}
.seg{
  flex:1;
  height:5px;
  border-radius:3px;
  background:var(--line);
}
.seg.filled{ background:var(--brass); }

.indicators{
  list-style:none;
  margin:0;
  padding:0;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.indicators li{
  font-size:11.5px;
  color:var(--teal);
  background:rgba(62,98,89,.08);
  padding:4px 9px;
  border-radius:20px;
}

.details{
  max-height:0;
  overflow:hidden;
  transition:max-height .28s ease;
}
.card.expanded .details{
  max-height:600px;
  margin-top:14px;
}
.detail-item{
  padding:10px 0;
  border-top:1px solid var(--line);
}
.detail-label{
  font-size:12.5px;
  font-weight:700;
  color:var(--ink);
  margin-bottom:3px;
}
.detail-label::before{
  content:'— ';
  color:var(--brass);
}
.detail-desc{
  font-size:12.5px;
  color:var(--text-mute);
  line-height:1.5;
}
.hint{
  font-size:11px;
  color:var(--text-mute);
  margin-top:12px;
  font-style:italic;
}

@media (max-width:860px){
  body{ flex-direction:column; }
  .rail{ position:relative; height:auto; width:100%; min-width:0; }
  .ladder::before{ display:none; }
  .main{ padding:32px 20px 60px; }
  .level-name{ font-size:28px; }
}
</style>
</head>

let currentLevel = 0;
let expandedCard = null;

function renderLadder(){
  const ladder = document.getElementById('ladder');
  ladder.innerHTML = '';
  LEVELS.forEach(lvl => {
    const rung = document.createElement('div');
    rung.className = 'rung' + (lvl.id === currentLevel ? ' active' : '');
    rung.onclick = () => { currentLevel = lvl.id; expandedCard = null; render(); };
    rung.innerHTML = `
      <div class="rung-node">${lvl.short}</div>
      <div class="rung-copy">
        <div class="rung-name">${lvl.name}</div>
      </div>`;
    ladder.appendChild(rung);
  });
}

function renderContent(){
  const lvl = LEVELS[currentLevel];
  document.getElementById('levelKicker').textContent = `Level ${lvl.id + 1} of ${LEVELS.length}`;
  document.getElementById('levelName').textContent = lvl.name;
  document.getElementById('levelTagline').textContent = lvl.tag;

  const container = document.getElementById('categories');
  container.innerHTML = '';

  Object.entries(DATA).forEach(([categoryName, competencies]) => {
    const section = document.createElement('div');
    section.className = 'category';

    const names = Object.keys(competencies);
    section.innerHTML = `
      <div class="category-head">
        <div class="category-title">${categoryName}</div>
        <div class="category-count">${names.length} competencies</div>
      </div>
      <div class="grid"></div>`;

    const grid = section.querySelector('.grid');
    names.forEach(name => {
      const cardId = categoryName + '::' + name;
      const entry = competencies[name][currentLevel];
      const isExpanded = expandedCard === cardId;

      const card = document.createElement('div');
      card.className = 'card' + (isExpanded ? ' expanded' : '');

      let segs = '';
      for(let i=0;i<LEVELS.length;i++){
        segs += `<div class="seg ${i <= currentLevel ? 'filled' : ''}"></div>`;
      }

      const detailItems = entry.i.map(ind => `
        <div class="detail-item">
          <div class="detail-label">${ind.t}</div>
          <div class="detail-desc">${ind.d}</div>
        </div>`).join('');

      card.innerHTML = `
        <div class="card-top">
          <div class="card-name">${name}</div>
          <div class="chevron">▾</div>
        </div>
        <div class="progress-track">${segs}</div>
        <div class="card-statement">${entry.s}</div>
        <ul class="indicators">${entry.i.map(x => `<li>${x.t}</li>`).join('')}</ul>
        <div class="details">${detailItems}</div>
        ${isExpanded ? '' : '<div class="hint">Click for behavioral detail →</div>'}`;

      card.onclick = () => {
        expandedCard = isExpanded ? null : cardId;
        render();
      };

      grid.appendChild(card);
    });

    container.appendChild(section);
  });
}

function render(){
  renderLadder();
  renderContent();
}

render();
